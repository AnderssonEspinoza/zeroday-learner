name: Update News Feed

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Refresh noticias.json
        run: npm run scrape

      - name: Create update PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Actualizar feed de noticias"
          branch: "automation/update-news-feed"
          delete-branch: true
          title: "Actualizar feed de noticias"
          body: |
            Actualizacion automatica del feed de noticias generada por GitHub Actions.

            Archivos actualizados:
            - `noticias.json`
            - `public/noticias.json`

            Revisa el cambio y fusiona este PR para publicar el feed nuevo respetando la proteccion de `main`.
